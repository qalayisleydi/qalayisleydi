<section class="about-pullquote">
  <p class="pullquote-text">{{ site.data.content.joybar.pullquote | strip }}</p>
</section>

<section class="about-story-stats">
  <div class="story-side">
    {% for paragraph in site.data.content.joybar.story %}
      <p>{{ paragraph | strip }}</p>
    {% endfor %}
  </div>
  <div class="stats-side">
    {% for stat in site.data.content.joybar.stats %}
      <div class="stat-item">
        <div class="stat-number">{{ stat.number }}</div>
        <div class="stat-label">{{ stat.label }}</div>
      </div>
    {% endfor %}
  </div>
</section>
