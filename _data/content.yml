# ============================================
# Bas bet (Homepage)
# ============================================
homepage:

  # --- Hero section ---
  hero:
    wordmark_line1: "Qalay"
    wordmark_line2: "isleydi?"
    lead: |
      Hár bir nárseniń qalay isleytuǵının qaraqalpaq tilinde tereń hám ápiwayı túsindiremiz.
    secondary: |
      Texnologiya, ilim hám tárijiybeler — barlıǵı bir orında, barlıǵı siz ushın. Temanı saylań hám oqıwdı baslań.

  # --- Topics section ---
  topics_heading: "Neni úyrenemiz?"
  topics:
    - title: "HTTP qalay isleydi?"
      description: "Soraw, juwap hám web saytlardı júklew mexanizimi."
      url: "https://http.qalayisleydi.uz"

# ============================================
# Joybar haqqında (About the Project)
# ============================================
joybar:

  # --- Hero section ---
  hero:
    wordmark_line1: "Joybar"
    wordmark_line2: "haqqında"
    lead: |
      «Qalay isleydi» — bul qaraqalpaq tilinde sapalı hám túsinikli bilim jaratıw boyınsha ashıq joybar.
    secondary: |
      Biziń maqsetimiz — quramalı ilimlerdi ańsat túsiniw múmkinshiligin jaratıw.

  # --- Pull quote ---
  pullquote: |
    Bilim hesh kimnen alıs emes, biz quramalı temalardı ápiwayı tilde úyretemiz.

  # --- Story paragraphs ---
  story:
    - |
      Qaraqalpaq tilinde texnologiya hám ilim boyınsha sapalı materiallar kóp emes. Kópshilik sapalı derekler orıs yamasa anglichan tilinde.
    - |
      «Qalay isleydi» usı máselege sál bolsa da sheshim beriw ushın baslandı.

  # --- Stats ---
  stats:
    - number: "1+"
      label: "Jarıyalanǵan tema"
    - number: "100%"
      label: "Biypul hám ashıq"

  # --- Call to action ---
  cta:
    heading: "Joybarǵa úles qosıń"
    description: |
      Hámmesi GitHub arqalı ashıq isleydi, siz de qáteliklerdi dúzetiwińiz yamasa jańa temalar haqqında jazıwıńız múmkin.
    primary_label: "GitHub-ta kóriw →"
    secondary_label: "Telegram kanal"
